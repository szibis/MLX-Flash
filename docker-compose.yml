# MLX-Flash Docker Compose
#
# NOTE: MLX inference requires native macOS + Apple Silicon (Metal GPU).
# These containers are for: testing, building, and CI/CD.
#
# Usage:
#   docker compose run tests          # Python test suite
#   docker compose run rust-build     # Compile Rust sidecar
#   docker compose run e2e            # Full stack e2e tests
#   docker compose up --build         # Build everything
#
# For real inference, run natively:
#   mlx-flash --port 8080 --workers 3

services:
  # --- Python test suite (no MLX, tests logic only) ---
  tests:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      python -m pytest tests/ -v --tb=short
      -k "not test_auto_detect and not test_mlx"
      --junitxml=/app/test-results/python.xml
    volumes:
      - test-results:/app/test-results
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - MLX_FLASH_TESTING=1

  # --- Rust sidecar build + test ---
  rust-build:
    build:
      context: .
      dockerfile: Dockerfile.rust
    command: cargo test --release
    volumes:
      - rust-target:/app/mlx-flash-server/target
      - test-results:/app/test-results

  # --- E2E: Python mock server + Rust proxy ---
  e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    depends_on:
      - mock-worker
    environment:
      - PYTHON_WORKER_PORT=8081
      - RUST_SERVER_PORT=8080
    command: /app/scripts/run-e2e.sh
    volumes:
      - test-results:/app/test-results

  # --- Mock Python worker (returns canned responses for e2e) ---
  mock-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m mlx_flash_compress.serve --port 8081 --host 0.0.0.0
    expose:
      - "8081"
    environment:
      - MLX_FLASH_MOCK=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  test-results:
  rust-target:
