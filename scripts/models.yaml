# Central model registry for DFlash profiling benchmarks.
# All models download to ~/.cache/huggingface/hub/ by default.
# Cleanup: python scripts/bench_multi_profile.py --cleanup

# Models are grouped by expected DFlash profile category.
# "drafter" field is set only for models with a matching DFlash drafter.

cache_dir: ~/.cache/huggingface/hub

models:
  # --- Small dense (AR > 80 tok/s, DFlash: skip) ---
  - id: mlx-community/Llama-3.2-3B-Instruct-4bit
    category_expected: small_dense
    size_gb_approx: 2
    notes: "Llama 3.2 3B, dense, 4-bit"

  - id: mlx-community/gemma-4-e2b-it-4bit
    category_expected: small_dense
    size_gb_approx: 1
    notes: "Gemma 4 E2B (1.2B), dense, 4-bit — may fail (unsupported arch)"
    skip: true

  # --- Medium dense (AR 15-40 tok/s, DFlash: medium_target) ---
  - id: mlx-community/Qwen3.5-27B-4bit
    category_expected: medium_dense
    size_gb_approx: 15
    notes: "Qwen 3.5 27B, dense, 4-bit"

  - id: mlx-community/Devstral-Small-2-24B-Instruct-2512-4bit
    category_expected: medium_dense
    size_gb_approx: 14
    notes: "Mistral Devstral 24B, dense, 4-bit (code-focused)"

  # --- Large dense (AR < 15 tok/s, DFlash: slow_target) ---
  - id: mlx-community/gemma-4-31b-it-4bit
    category_expected: large_dense
    size_gb_approx: 18
    notes: "Gemma 4 31B, dense, 4-bit"

  # --- Small MoE (AR > 50 tok/s, DFlash: skip) ---
  - id: mlx-community/Qwen3.6-35B-A3B-4bit
    category_expected: ssd_small
    size_gb_approx: 19
    drafter: z-lab/Qwen3.6-35B-A3B-DFlash
    notes: "Qwen 3.6 35B MoE (3B active), 30 SSM + 10 attn, 4-bit"

  - id: mlx-community/Qwen3-30B-A3B-4bit
    category_expected: small_moe
    size_gb_approx: 16
    notes: "Qwen 3 30B MoE (3B active), 4-bit"

  # --- Medium MoE ---
  - id: mlx-community/Qwen3.5-35B-A3B-4bit
    category_expected: small_moe
    size_gb_approx: 20
    notes: "Qwen 3.5 35B MoE (3B active), 4-bit"

  - id: mlx-community/gemma-4-26b-a4b-it-4bit
    category_expected: small_moe
    size_gb_approx: 14
    notes: "Gemma 4 26B MoE (4B active), 4-bit"

  # --- Large MoE (AR < 15 tok/s, DFlash: slow_target) ---
  - id: mlx-community/DeepSeek-V4-Flash-2bit-DQ
    category_expected: large_moe
    size_gb_approx: 90
    notes: "DeepSeek V4 Flash 284B (13B active), 2-bit DQ. Requires 128GB+ or expert streaming."
    skip_on_small_ram: true
