# Central model registry for MLX-Flash.
# All models download to ~/.cache/huggingface/hub/ by default.

cache_dir: ~/.cache/huggingface/hub

models:
  # --- Small dense (< 5GB, fast AR) ---
  - id: mlx-community/Llama-3.2-3B-Instruct-4bit
    category_expected: small_dense
    size_gb_approx: 2
    notes: "Llama 3.2 3B, dense, 4-bit"

  - id: mlx-community/Llama-3.2-1B-Instruct-4bit
    category_expected: small_dense
    size_gb_approx: 1
    notes: "Llama 3.2 1B, dense, 4-bit — fastest"

  - id: mlx-community/Qwen3-4B-4bit
    category_expected: small_dense
    size_gb_approx: 3
    notes: "Qwen 3 4B, dense, 4-bit"

  - id: mlx-community/Phi-4-mini-instruct-4bit
    category_expected: small_dense
    size_gb_approx: 2
    notes: "Phi 4 Mini 3.8B, dense, 4-bit (Microsoft)"

  # --- Medium dense (5-20GB) ---
  - id: mlx-community/Qwen3-8B-4bit
    category_expected: medium_dense
    size_gb_approx: 5
    notes: "Qwen 3 8B, dense, 4-bit"

  - id: mlx-community/Llama-3.3-70B-Instruct-4bit
    category_expected: large_dense
    size_gb_approx: 40
    notes: "Llama 3.3 70B, dense, 4-bit — needs 48GB+"

  - id: mlx-community/Qwen3.5-27B-4bit
    category_expected: medium_dense
    size_gb_approx: 15
    notes: "Qwen 3.5 27B, dense, 4-bit"

  - id: mlx-community/Devstral-Small-2-24B-Instruct-2512-4bit
    category_expected: medium_dense
    size_gb_approx: 14
    notes: "Mistral Devstral 24B, dense, 4-bit (code-focused)"

  - id: mlx-community/gemma-4-12b-it-4bit
    category_expected: medium_dense
    size_gb_approx: 7
    notes: "Gemma 4 12B, dense, 4-bit (Google)"

  # --- Large dense (20GB+) ---
  - id: mlx-community/gemma-4-31b-it-4bit
    category_expected: large_dense
    size_gb_approx: 18
    notes: "Gemma 4 31B, dense, 4-bit (Google)"

  # --- Small MoE ---
  - id: mlx-community/Qwen3-30B-A3B-4bit
    category_expected: small_moe
    size_gb_approx: 16
    notes: "Qwen 3 30B MoE (3B active), 4-bit"

  - id: mlx-community/Qwen3.5-35B-A3B-4bit
    category_expected: small_moe
    size_gb_approx: 20
    notes: "Qwen 3.5 35B MoE (3B active), 4-bit"

  - id: mlx-community/gemma-4-26b-a4b-it-4bit
    category_expected: small_moe
    size_gb_approx: 14
    notes: "Gemma 4 26B MoE (4B active), 4-bit (Google)"

  # --- Medium/Large MoE ---
  - id: mlx-community/Qwen3.6-35B-A3B-4bit
    category_expected: medium_moe
    size_gb_approx: 19
    drafter: z-lab/Qwen3.6-35B-A3B-DFlash
    notes: "Qwen 3.6 35B MoE (3B active), SSM+attn hybrid, 4-bit"

  - id: mlx-community/Mixtral-8x7B-Instruct-v0.1-4bit
    category_expected: medium_moe
    size_gb_approx: 24
    notes: "Mixtral 8x7B MoE (12B active), 4-bit (Mistral)"
