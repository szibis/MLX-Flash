name: Auto-Tag Release

# Triggers on merge to main. If the PR has a release label, creates a tag
# for the version already in pyproject.toml and triggers the release workflow.
#
# Labels:
#   release:major, release:minor, release:patch → create release
#   no label → no release
#
# The version in pyproject.toml must be bumped IN the PR (pre-bump pattern).
on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-tag:
    name: Determine version and tag
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]') && !startsWith(github.event.head_commit.message, 'chore:') && !startsWith(github.event.head_commit.message, 'release:')"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Find merged PR and its labels
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          PR_NUM=$(echo "$COMMIT_MSG" | grep -oE '#[0-9]+' | head -1 | tr -d '#')
          echo "From commit message: PR #${PR_NUM:-none}"

          if [ -z "$PR_NUM" ]; then
            sleep 5
            PR_NUM=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].number // empty' 2>/dev/null || echo "")
            echo "From API: PR #${PR_NUM:-none}"
          fi

          echo "number=${PR_NUM}" >> $GITHUB_OUTPUT

          if [ -z "$PR_NUM" ]; then
            echo "bump=none" >> $GITHUB_OUTPUT
            echo "No PR found for this commit"
            exit 0
          fi

          LABELS=$(gh api repos/${{ github.repository }}/issues/${PR_NUM}/labels --jq '.[].name' 2>/dev/null || echo "")
          echo "labels=${LABELS}" >> $GITHUB_OUTPUT
          echo "PR #${PR_NUM} labels: ${LABELS}"

          if echo "$LABELS" | grep -qE "release:(major|minor|patch)"; then
            BUMP=$(echo "$LABELS" | grep -oE "release:(major|minor|patch)" | head -1 | cut -d: -f2)
            echo "bump=${BUMP}" >> $GITHUB_OUTPUT
          else
            echo "bump=none" >> $GITHUB_OUTPUT
            echo "No release label found — skipping release"
          fi

      - name: Read version from pyproject.toml
        if: steps.pr.outputs.bump != 'none'
        id: version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION} (bump type: ${{ steps.pr.outputs.bump }})"

      - name: Check tag doesn't exist
        if: steps.pr.outputs.bump != 'none'
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${TAG} already exists — skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.pr.outputs.bump != 'none' && steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Tagged ${TAG}"

      - name: Trigger release workflow
        if: steps.pr.outputs.bump != 'none' && steps.check_tag.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh workflow run release.yml -f tag="${TAG}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        if: steps.pr.outputs.bump != 'none' && steps.check_tag.outputs.exists == 'false'
        run: |
          echo "### Release v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Bump type: ${{ steps.pr.outputs.bump }}" >> $GITHUB_STEP_SUMMARY
          echo "- Release workflow triggered" >> $GITHUB_STEP_SUMMARY

      - name: No release label
        if: steps.pr.outputs.bump == 'none' && steps.pr.outputs.number != ''
        run: |
          echo "PR #${{ steps.pr.outputs.number }} has no release label. Add one of:"
          echo "  release:major — breaking changes"
          echo "  release:minor — new features"
          echo "  release:patch — bug fixes"
          echo ""
          echo "No release will be created for this merge."
